apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: artemis-prod-api-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
    - host: artemis.coe332.tacc.cloud  # replace with your class cluster host
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: artemis-prod-api-service
                port:
                  number: 5000
