apiVersion: v1
kind: Service
metadata:
  name: artemis-prod-api-nodeport
spec:
  type: NodePort
  selector:
    app: artemis-prod-api
  ports:
    - port: 5000
      targetPort: 5000
      # nodePort intentionally unset — k8s auto-assigns one in the 30000–32767
      # range to avoid collisions with other students' services. Discover it
      # after deploy with: kubectl get svc artemis-prod-api-nodeport
