apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: artemis-test-api-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: "wsuan-artemis-test.coe332.tacc.cloud"
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: artemis-test-api-service
                port:
                  number: 5000
