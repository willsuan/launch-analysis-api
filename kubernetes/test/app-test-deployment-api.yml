apiVersion: apps/v1
kind: Deployment
metadata:
  name: artemis-test-api-deployment
  labels:
    app: artemis-test-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: artemis-test-api
  template:
    metadata:
      labels:
        app: artemis-test-api
    spec:
      containers:
        - name: api
          image: willsuan/artemis-launch-api:test
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: REDIS_HOST
              value: artemis-test-redis-service
            - name: REDIS_PORT
              value: "6379"
            - name: DATA_FILE
              value: /data/launches.json
          # An emptyDir gives the API its own /data scratch space for the
          # one-shot launches.json bootstrap file. We copy data in via
          # `kubectl cp`, then POST /data loads it into Redis (which IS
          # persisted via its own PVC).
          volumeMounts:
            - mountPath: /data
              name: bootstrap-data
      volumes:
        - name: bootstrap-data
          emptyDir: {}
